<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navvy | Editor & Creador</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Tu Paleta de Colores Oficial */
        :root {
            --bg-dark: #091221;
            --text-bone: #F0ddca;
            --accent-blue: #0236a5;
            --neon-red: #E6003B;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-bone);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Textura sutil de fondo para quitar lo plano */
            background-image: radial-gradient(circle at center, #0c182c 0%, var(--bg-dark) 100%);
        }

        /* Contenedor Principal (Estilo Threshold Editor) */
        .hero-container {
            text-align: center;
            z-index: 10;
        }

        .title {
            font-family: 'Anton', sans-serif;
            font-size: 6rem;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
            line-height: 1;
            text-shadow: 4px 4px 0px rgba(2, 54, 165, 0.3); /* Sombra azul eléctrica */
        }

        .subtitle {
            font-size: 1.2rem;
            margin-top: 10px;
            color: #b0a395; /* Un tono más oscuro de tu color hueso */
            letter-spacing: 1px;
        }

        /* El recuadro central donde irá tu VTuber o Video */
        .media-placeholder {
            width: 600px;
            height: 340px;
            margin: 40px auto;
            background-color: #050a14;
            border: 2px solid var(--accent-blue);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(2, 54, 165, 0.2);
        }

        /* Efecto Glow Rojo Agresivo al pasar el mouse (Estilo Akko Pack) */
        .media-placeholder:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 40px rgba(230, 0, 59, 0.6), inset 0 0 20px rgba(230, 0, 59, 0.2);
            transform: scale(1.02);
            cursor: pointer;
        }

        /* Menú Flotante Inferior (Estilo Píldora) */
        .floating-nav {
            position: fixed;
            bottom: 40px;
            background-color: rgba(5, 10, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-blue);
            padding: 12px 30px;
            border-radius: 50px;
            display: flex;
            gap: 30px;
            z-index: 100;
        }

        .floating-nav a {
            color: var(--text-bone);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .floating-nav a:hover {
            color: var(--neon-red);
        }
        
        /* Botón destacado en el menú */
        .nav-highlight {
            color: var(--neon-red) !important;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <h1 class="title">NAVVY</h1>
        <p class="subtitle">[ CREADOR & RECURSOS ]</p>
        
        <div class="media-placeholder">
            <p style="color: var(--accent-blue); font-family: 'Anton'; font-size: 2rem; letter-spacing: 2px;">VTUBER / VIDEO DEMO</p>
        </div>
    </div>

    <div class="floating-nav">
        <a href="#">Inicio</a>
        <a href="#">La Bóveda</a>
        <a href="#">Portafolio</a>
        <a href="#" class="nav-highlight">Neuro Edit</a>
    </div>

</body>
</html>
