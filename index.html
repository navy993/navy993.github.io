<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navvy | Recursos & Edición</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050a14; /* Aún más oscuro para mayor contraste */
            --text-bone: #F0ddca;
            --accent-blue: #0236a5;
            --neon-red: #E6003B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            background-color: var(--bg-dark);
            color: var(--text-bone);
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
            height: 100%;
        }

        /* TEXTURA HALFTONE AGRESIVA Y FONDO ROJO SUTIL */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Mezcla de tu azul oscuro con destellos del rojo neón en el centro */
            background: radial-gradient(circle at center, rgba(230,0,59,0.08) 0%, var(--bg-dark) 70%),
                        radial-gradient(rgba(230,0,59,0.15) 1px, transparent 1px);
            background-size: 100% 100%, 8px 8px; /* El 8px 8px hace el efecto de puntitos */
            z-index: -2;
        }

        /* EL ARTE GIGANTE A LA IZQUIERDA (Estilo Threshold) */
        .bg-avatar {
            position: fixed;
            top: 10%;
            left: -5%;
            width: 45vw; /* Ocupa casi la mitad de la pantalla */
            height: 90vh;
            /* AQUÍ PONDRÁS LA IMAGEN DE TU AVATAR */
            /* background-image: url('link-a-tu-imagen.png'); */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom left;
            z-index: -1;
            opacity: 0.8;
            /* Placeholder temporal para que veas dónde va */
            border: 2px dashed var(--neon-red);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-avatar p {
            font-family: 'Anton';
            color: rgba(230,0,59,0.5);
            font-size: 2rem;
            transform: rotate(-10deg);
        }

        /* CONTENEDOR CENTRAL DEL VIDEO */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Centrado perfecto en pantalla */
            position: relative;
            z-index: 10;
        }

        .video-container {
            width: 800px;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 15px rgba(230,0,59,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .video-container:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(230,0,59,0.4);
            border-color: var(--neon-red);
        }

        .video-container h2 {
            font-family: 'Anton';
            font-size: 3rem;
            color: var(--text-bone);
            letter-spacing: 2px;
            opacity: 0.5;
        }

        /* MENÚ FLOTANTE MINIMALISTA (Estilo Píldora) */
        .nav-container {
            position: fixed;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .floating-pill {
            background-color: rgba(9, 18, 33, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(240, 221, 202, 0.1);
        }

        .floating-pill a {
            color: var(--text-bone);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .floating-pill a:hover {
            color: var(--neon-red);
        }

        /* BOTÓN ESPECIAL NEURO EDIT */
        .btn-discord {
            background-color: var(--text-bone);
            color: var(--bg-dark) !important;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 900 !important;
            transition: all 0.3s ease !important;
        }

        .btn-discord:hover {
            background-color: var(--neon-red);
            color: white !important;
            box-shadow: 0 0 15px var(--neon-red);
        }

        /* SECCIONES PARA SCROLL DE CONTENIDO */
        .content-section {
            min-height: 100vh;
            padding: 100px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .section-title {
            font-family: 'Anton';
            font-size: 4rem;
            color: var(--text-bone);
            margin-bottom: 50px;
            text-shadow: 4px 4px 0px rgba(2, 54, 165, 0.5);
        }

    </style>
</head>
<body>

    <div class="bg-avatar">
        <p>AQUÍ VA TU VTUBER GIGANTE</p>
    </div>

    <div class="main-content" id="inicio">
        <div class="video-container">
            <h2>DEMO REEL</h2>
            </div>
    </div>

    <div class="content-section" id="recursos">
        <h2 class="section-title">RECURSOS</h2>
        </div>

    <div class="nav-container">
        <div class="floating-pill">
            <a href="#inicio">Inicio</a>
            <a href="#recursos">Recursos</a>
            <a href="#">Portafolio</a>
            <a href="https://discord.gg/SDjSfmhhsH" target="_blank" class="btn-discord">Neuro Edit</a>
        </div>
    </div>

</body>
</html>
