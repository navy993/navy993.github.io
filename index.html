<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navvy | Creador & Recursos</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Tu Paleta de Colores Oficial */
        :root {
            --bg-dark: #091221;
            --text-bone: #F0ddca;
            --accent-blue: #0236a5;
            --neon-red: #E6003B;
        }

        /* RESET BÁSICO */
        * { margin: 0; padding: 0; box-shadow: border-box; }
        
        body, html {
            background-color: var(--bg-dark);
            color: var(--text-bone);
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth; /* Activa el scroll suave */
            overflow-x: hidden;
        }

        /* TEXTURA DE FONDO SUTIL (Estilo Threshold Editor) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(#1a2c4d 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.15;
            z-index: -1;
        }

        /* ESTRUCTURA GENERAL HORIZONTAL */
        .page-container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER / LOGO (Arriba a la izquierda) */
        header {
            padding: 20px 0;
            display: flex;
            justify-content: flex-start;
        }
        .main-logo {
            font-family: 'Anton', sans-serif;
            font-size: 2rem;
            color: var(--text-bone);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px rgba(2, 54, 165, 0.3);
        }

        /* SECCIÓN HERO (PORTADA) - ESTRUCTURA HORIZONTAL */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Separa texto e imagen */
            height: calc(100vh - 120px); /* Ajuste para caber en pantalla */
            gap: 50px;
            padding: 50px 0;
        }

        /* Columna de Texto (Izquierda) */
        .hero-text {
            flex: 1;
            text-align: left;
        }
        .title {
            font-family: 'Anton', sans-serif;
            font-size: 6rem;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
            line-height: 1;
            /* Efecto de glitch sutil */
            text-shadow: 4px 4px 0px rgba(2, 54, 165, 0.4);
        }
        .subtitle {
            font-size: 1.4rem;
            margin-top: 15px;
            color: #b0a395;
            letter-spacing: 1.5px;
            font-weight: 400;
        }

        /* Columna de Media / Placeholder (Derecha) */
        .hero-media {
            flex: 1.5; /* Más ancho para el video */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .media-placeholder {
            width: 100%;
            max-width: 800px; /* Tamaño máximo para que no se deforme */
            aspect-ratio: 16 / 9; /* Forzamos proporciones de video */
            background-color: #050a14;
            border: 2px solid rgba(2, 54, 165, 0.3);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(2, 54, 165, 0.1);
            position: relative;
            overflow: hidden;
        }
        /* Efecto Glow Rojo Agresivo (Estilo Akko Pack/Threshold) */
        .media-placeholder:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 50px rgba(230, 0, 59, 0.5), inset 0 0 30px rgba(230, 0, 59, 0.1);
            transform: translateY(-5px) scale(1.01);
            cursor: pointer;
        }
        .media-placeholder p {
            color: var(--accent-blue);
            font-family: 'Anton';
            font-size: 2.5rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--accent-blue);
        }
        .media-placeholder span {
            font-size: 0.9rem;
            color: #555;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* MENÚ FLOTANTE INFERIOR (Estilo Píldora - Threshold Style) */
        .floating-nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(5, 10, 20, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(2, 54, 165, 0.4);
            padding: 14px 40px;
            border-radius: 50px;
            display: flex;
            gap: 40px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .floating-nav a {
            color: var(--text-bone);
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.2s, transform 0.1s;
        }
        .floating-nav a:hover {
            color: var(--neon-red);
            transform: translateY(-2px);
        }
        /* Botón destacado en el menú */
        .nav-highlight {
            color: var(--neon-red) !important;
            border-bottom: 2px solid var(--neon-red);
            padding-bottom: 5px;
        }

        /* SECCIONES ADICIONALES (Para que los enlaces sirvan) */
        .content-section {
            height: 80vh; /* Altura para el scroll */
            padding: 100px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(2, 54, 165, 0.1);
        }
        .content-section h2 {
            font-family: 'Anton', sans-serif;
            font-size: 4rem;
            color: #0c182c; /* Título oscuro/invisible para el scroll */
        }

    </style>
</head>
<body>

    <div class="page-container" id="inicio">
        <header>
            <div class="main-logo">NVY</div>
        </header>
        
        <main class="hero-section">
            <div class="hero-text">
                <h1 class="title">NAVVY</h1>
                <p class="subtitle">[ CREADOR & RECURSOS ]</p>
            </div>
            
            <div class="hero-media">
                <div class="media-placeholder">
                    <p>DEMO REEL PENDING</p>
                    <span>Esperando media (revisar código)</span>
                </div>
            </div>
        </main>
    </div>

    <div class="content-section" id="recursos">
        <h2>[ Sección Recursos ]</h2>
    </div>
    <div class="content-section" id="portafolio">
        <h2>[ Sección Portafolio ]</h2>
    </div>

    <div class="floating-nav">
        <a href="#inicio">Inicio</a>
        <a href="#recursos">Recursos</a> <a href="#portafolio">Portafolio</a>
        <a href="#" class="nav-highlight">Neuro Edit</a>
    </div>

</body>
</html>
